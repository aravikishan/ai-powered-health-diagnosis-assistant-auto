<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <title>Symptom Checker</title>
</head>
<body>
    <header>
        <h1>AI-Powered Health Diagnosis Assistant</h1>
    </header>
    <nav>
        <a href="/">Home</a>
        <a href="/diagnosis" class="active">Diagnosis</a>
        <a href="/resources">Resources</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
    </nav>
    <main class="container">
        <h1 class="mt-5">Symptom Checker</h1>
        <form id="symptom-form">
            <div class="mb-3">
                <label for="symptoms" class="form-label">Enter your symptoms:</label>
                <input type="text" class="form-control" id="symptoms" placeholder="e.g., headache, fever">
            </div>
            <button type="submit" class="btn btn-primary">Get Diagnosis</button>
        </form>
        <div id="recommendation" class="mt-3"></div>
    </main>
    <footer>
        <p>&copy; 2023 AI Health Diagnosis</p>
    </footer>
    <script src="/static/js/main.js"></script>
</body>
</html>
